# /etc/nginx/sites-available/edustream
#
# Copy to: sudo cp nginx.conf /etc/nginx/sites-available/edustream
# Enable:  sudo ln -s /etc/nginx/sites-available/edustream /etc/nginx/sites-enabled/
# Test:    sudo nginx -t
# Reload:  sudo systemctl reload nginx

upstream nextjs {
    # Matches PORT in ecosystem.config.js
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── Redirect HTTP → HTTPS ──────────────────────────────────────
# (comment this block out if you don't have an SSL certificate yet)
server {
    listen 80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # ── SSL (managed by Certbot – see below) ──────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_proxied    any;
    gzip_comp_level 4;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options     "SAMEORIGIN"               always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header Referrer-Policy     "strict-origin-when-cross-origin" always;

    # ── Static assets (Next.js build output) ─────────────────
    location /_next/static/ {
        alias /home/YOUR_USER/frontend/.next/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Public folder ─────────────────────────────────────────
    location /public/ {
        alias /home/YOUR_USER/frontend/public/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── Favicon / robots / sitemap ────────────────────────────
    location ~* ^/(favicon\.ico|robots\.txt|sitemap\.xml)$ {
        proxy_pass http://nextjs;
        expires 1d;
        access_log off;
    }

    # ── All other requests → Next.js ──────────────────────────
    location / {
        proxy_pass http://nextjs;

        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_buffer_size   16k;
        proxy_buffers       4 32k;
    }
}

